<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b0f0c" />
  <meta
    name="description"
    content="Virtual Tour 360° Vườn Quốc Gia"
  />
  <title>Virtual Tour 360° - Vườn Quốc Gia</title>

  <!-- Photo Sphere Viewer CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5/index.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.min.css"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin@5/index.min.css"
  />

  <style>
    :root {
      --bg: #050505;
      --panel: rgba(16, 16, 16, 0.72);
      --panel-strong: rgba(10, 10, 10, 0.88);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.62);
      --accent: #4ade80;
      --accent-dark: #0d3b1e;
      --shadow-lg: 0 12px 34px rgba(0, 0, 0, 0.38);
      --shadow-md: 0 8px 22px rgba(0, 0, 0, 0.3);
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      position: relative;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 1;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: #fff;
      background:
        radial-gradient(circle at center, rgba(28, 44, 34, 0.55) 0%, rgba(10, 10, 10, 0.96) 55%),
        linear-gradient(180deg, #0d1110 0%, #050505 100%);
      transition: opacity 0.45s ease, visibility 0.45s ease;
      visibility: visible;
      opacity: 1;
    }

    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.06);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.2px;
    }

    .loading-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.58);
      letter-spacing: 0.2px;
    }

    /* Top logo */
    #top-logo {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: max(14px, env(safe-area-inset-left));
      z-index: 120;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #top-logo:hover {
      transform: scale(1.03);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.42);
    }

    #top-logo img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      display: block;
    }

    /* Bottom HUD */
    #hud {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 150;
      width: min(92vw, 720px);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    #scene-caption {
      min-height: 46px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-md);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(12px);
    }

    #gallery-toggle {
      pointer-events: auto;
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      border: none;
      border-radius: 50%;
      background: rgba(40, 40, 40, 0.9);
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease;
      font-size: 20px;
      line-height: 1;
    }

    #gallery-toggle:hover {
      transform: scale(1.05);
      background: rgba(58, 58, 58, 0.96);
    }

    #gallery-toggle.active {
      background: var(--accent);
      color: #06250f;
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.2), var(--shadow-md);
    }

    #gallery-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* Hide default virtual-tour arrows */
    .vt-arrow-hidden {
      display: none !important;
    }

    /* Generic marker button */
    .tour-marker {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
    }

    .tour-marker:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* Thumbnail marker for overview scenes */
    .tour-marker--thumb {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      overflow: hidden;
      display: block;
      background: #161616;
      border: 3px solid rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.42);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .tour-marker--thumb:hover {
      transform: scale(1.08);
      border-color: var(--accent);
      box-shadow:
        0 0 0 5px rgba(74, 222, 128, 0.2),
        0 8px 22px rgba(0, 0, 0, 0.42);
    }

    .tour-marker--thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;
    }

    /* Arrow marker for navigation scenes */
    .tour-marker--arrow {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 10, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .tour-marker--arrow:hover {
      transform: scale(1.06);
      border-color: var(--accent);
      background: rgba(18, 18, 18, 0.96);
      box-shadow:
        0 0 0 5px rgba(74, 222, 128, 0.18),
        0 8px 22px rgba(0, 0, 0, 0.42);
    }

    .tour-marker__arrow-core {
      position: relative;
      width: 28px;
      height: 28px;
      display: block;
      transform-origin: 50% 50%;
    }

    .tour-marker__arrow-shaft {
      position: absolute;
      left: 12px;
      top: 4px;
      width: 4px;
      height: 18px;
      border-radius: 3px;
      background: #fff;
    }

    .tour-marker__arrow-head {
      position: absolute;
      left: 6px;
      top: 0;
      width: 16px;
      height: 16px;
      border-top: 4px solid #fff;
      border-right: 4px solid #fff;
      box-sizing: border-box;
      transform: rotate(-45deg);
    }

    .tour-marker--arrow.is-forward .tour-marker__arrow-core {
      transform: rotate(0deg);
    }

    .tour-marker--arrow.is-left .tour-marker__arrow-core {
      transform: rotate(-55deg);
    }

    .tour-marker--arrow.is-right .tour-marker__arrow-core {
      transform: rotate(55deg);
    }

    /* PSV UI tuning */
    .psv-navbar {
      background: rgba(18, 18, 18, 0.42) !important;
      backdrop-filter: blur(12px) !important;
      box-shadow: 0 -4px 18px rgba(0, 0, 0, 0.18);
    }

    .psv-button {
      color: rgba(255, 255, 255, 0.82) !important;
    }

    .psv-button--active {
      background: rgba(255, 255, 255, 0.14) !important;
    }

    .psv-gallery {
      background: rgba(8, 8, 8, 0.92) !important;
      backdrop-filter: blur(12px) !important;
      border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
    }

    .psv-gallery-container {
      padding: 14px !important;
    }

    .psv-gallery-item {
      border-radius: 10px !important;
      overflow: hidden !important;
      transition: transform 0.18s ease !important;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .psv-gallery-item:hover {
      transform: scale(1.04) !important;
    }

    .psv-gallery-item-title {
      background: rgba(0, 0, 0, 0.74) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      padding: 5px 6px !important;
    }

    .psv-gallery-item--active {
      border: 3px solid var(--accent) !important;
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.18) !important;
    }

    .psv-tooltip {
      z-index: 260 !important;
    }

    .psv-tooltip-content {
      font-weight: 600 !important;
      backdrop-filter: blur(10px);
    }

    .psv-loader-text {
      color: rgba(255, 255, 255, 0.84) !important;
    }

    /* Optional subtle fade support */
    .app-fade-enter {
      opacity: 0;
    }

    .app-fade-enter-active {
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      #hud {
        width: min(94vw, 640px);
      }
    }

    @media (max-width: 768px) {
      #top-logo {
        width: 56px;
        height: 56px;
      }

      #top-logo img {
        width: 48px;
        height: 48px;
      }

      #hud {
        width: min(95vw, 560px);
        bottom: max(14px, env(safe-area-inset-bottom));
        gap: 8px;
      }

      #scene-caption {
        min-height: 44px;
        font-size: 13px;
        padding: 10px 14px;
      }

      #gallery-toggle {
        width: 44px;
        height: 44px;
        flex-basis: 44px;
      }

      .tour-marker--thumb {
        width: 56px;
        height: 56px;
      }

      .tour-marker--arrow {
        width: 60px;
        height: 60px;
      }

      .tour-marker__arrow-core {
        width: 24px;
        height: 24px;
      }

      .tour-marker__arrow-shaft {
        left: 10px;
        top: 4px;
        height: 15px;
        width: 4px;
      }

      .tour-marker__arrow-head {
        left: 5px;
        width: 14px;
        height: 14px;
        border-top-width: 3px;
        border-right-width: 3px;
      }
    }

    @media (max-width: 480px) {
      #scene-caption {
        font-size: 12px;
      }

      .loading-logo {
        font-size: 20px;
      }

      .loading-subtitle {
        font-size: 12px;
      }
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.min.js",
        "three/": "https://cdn.jsdelivr.net/npm/three@0.165/",
        "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.min.js",
        "@photo-sphere-viewer/equirectangular-tiles-adapter": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/equirectangular-tiles-adapter@5/index.module.min.js",
        "@photo-sphere-viewer/virtual-tour-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5/index.module.min.js",
        "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.module.min.js",
        "@photo-sphere-viewer/gallery-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin@5/index.module.min.js",
        "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5/index.module.min.js",
        "@photo-sphere-viewer/stereo-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/stereo-plugin@5/index.module.min.js"
      }
    }
  </script>
</head>
<body>
  <noscript>
    <div
      style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050505;
        color: white;
        z-index: 10000;
        padding: 24px;
        text-align: center;
        font-family: Segoe UI, sans-serif;
      "
    >
      Website này cần bật JavaScript để chạy Virtual Tour.
    </div>
  </noscript>

  <div id="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <div class="loading-logo">🌿 Vườn Quốc Gia</div>
    <div class="loading-subtitle">Đang tải Virtual Tour 360°...</div>
  </div>

  <a id="top-logo" href="/" title="Về trang chủ" aria-label="Về trang chủ">
    <img src="assets/logo.png" alt="Logo Vườn Quốc Gia" />
  </a>

  <main id="viewer" aria-label="Virtual Tour 360 độ"></main>

  <div id="hud">
    <div id="scene-caption" title="Tên địa điểm">Đang tải...</div>
    <button
      id="gallery-toggle"
      type="button"
      aria-label="Mở thư viện scene"
      title="Thư viện scene"
    >
      🖼
    </button>
  </div>

  <script type="module" src="./tour.js"></script>
</body>
</html>
