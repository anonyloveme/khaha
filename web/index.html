<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Tour - Vườn Quốc Gia</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5/index.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin@5/index.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #111 0%, #070707 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      gap: 18px;
      transition: opacity .45s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(255,255,255,0.12);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-logo {
      font-size: 22px;
      font-weight: 700;
      color: #4ade80;
      letter-spacing: .2px;
    }

    .loading-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }

    #top-logo {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 120;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #top-logo img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      display: block;
    }

    #hud {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 150;
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(92vw, 680px);
      pointer-events: none;
    }

    #scene-caption {
      flex: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(18,18,18,.72);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #gallery-toggle {
      pointer-events: auto;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(40,40,40,.86);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
    }

    #gallery-toggle:hover {
      transform: scale(1.06);
      background: rgba(55,55,55,.95);
    }

    #gallery-toggle.active {
      background: #4ade80;
      color: #06250f;
      box-shadow: 0 0 0 4px rgba(74,222,128,.22);
    }

    .vt-arrow-hidden {
      display: none !important;
    }

    .thumb-hotspot {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.95);
      background: #1c1c1c;
      cursor: pointer;
      display: block;
      box-shadow: 0 8px 20px rgba(0,0,0,.45);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      pointer-events: auto;
    }

    .thumb-hotspot:hover {
      transform: scale(1.08);
      border-color: #4ade80;
      box-shadow: 0 0 0 5px rgba(74,222,128,.20), 0 8px 20px rgba(0,0,0,.45);
    }

    .thumb-hotspot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .psv-gallery {
      background: rgba(8,8,8,.90) !important;
      backdrop-filter: blur(12px) !important;
      border-top: 1px solid rgba(255,255,255,.10) !important;
    }

    .psv-gallery-item {
      border-radius: 10px !important;
      overflow: hidden !important;
      transition: transform .18s ease !important;
    }

    .psv-gallery-item:hover {
      transform: scale(1.04) !important;
    }

    .psv-gallery-item-title {
      background: rgba(0,0,0,.72) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      padding: 5px 6px !important;
    }

    .psv-gallery-item--active {
      border: 3px solid #4ade80 !important;
      box-shadow: 0 0 0 4px rgba(74,222,128,.18) !important;
    }

    .psv-tooltip {
      z-index: 250 !important;
    }

    .psv-navbar {
      background: rgba(20,20,20,.42) !important;
      backdrop-filter: blur(10px) !important;
    }

    @media (max-width: 768px) {
      #hud {
        width: min(94vw, 540px);
        bottom: 14px;
      }

      #scene-caption {
        font-size: 13px;
        padding: 10px 14px;
      }

      .thumb-hotspot {
        width: 54px;
        height: 54px;
      }

      #top-logo {
        width: 54px;
        height: 54px;
      }

      #top-logo img {
        width: 46px;
        height: 46px;
      }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.min.js",
      "three/": "https://cdn.jsdelivr.net/npm/three@0.165/",
      "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.min.js",
      "@photo-sphere-viewer/equirectangular-tiles-adapter": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/equirectangular-tiles-adapter@5/index.module.min.js",
      "@photo-sphere-viewer/virtual-tour-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin@5/index.module.min.js",
      "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.module.min.js",
      "@photo-sphere-viewer/gallery-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin@5/index.module.min.js",
      "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5/index.module.min.js",
      "@photo-sphere-viewer/stereo-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/stereo-plugin@5/index.module.min.js"
    }
  }
  </script>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-logo">🌿 Vườn Quốc Gia</div>
    <div class="loading-subtitle">Đang tải Virtual Tour...</div>
  </div>

  <a id="top-logo" href="/" title="Trang chủ">
    <img src="thumbs/scene_01.jpg" alt="Logo" />
  </a>

  <div id="viewer"></div>

  <div id="hud">
    <div id="scene-caption">Đang tải...</div>
    <button id="gallery-toggle" type="button" aria-label="Mở thư viện scene">🖼</button>
  </div>

  <script type="module" src="tour.js"></script>
</body>
</html>
